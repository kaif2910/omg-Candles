<header class="site-header">
  <div class="container nav-wrap">
    <a class="logo" routerLink="/">
      <img src="assets/images/logo.png" alt="OMG Gifts logo" width="40" height="40">
      <span>OMG Gifts</span>
    </a>
    <button class="hamburger" aria-label="Open menu" (click)="toggleNav()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="#6b4a4a" stroke-width="2"/>
      </svg>
    </button>
    <nav class="nav" [class.open]="isNavOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="isNavOpen = false">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="isNavOpen = false">About</a>
      <a routerLink="/products" routerLinkActive="active" (click)="isNavOpen = false">Products</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="isNavOpen = false">Contact</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" (click)="toggleTheme()">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"></circle>
        <path d="M12 2v2 M12 20v2 M4.9 4.9l1.4 1.4 M17.7 17.7l1.4 1.4 M2 12h2 M20 12h2 M4.9 19.1l1.4-1.4 M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="2" fill="none"></path>
      </svg>
    </button>
  </div>
</header>
